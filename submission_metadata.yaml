# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Built a two-stage hybrid candidate ranking pipeline that combines semantic retrieval, 
  lexical matching, structured reasoning, and neural reranking. The Job Description is 
  decomposed into weighted hiring dimensions (e.g., Technical Skills, Ranking & Retrieval, 
  Production Experience), each evaluated independently. Stage 1 combines BGE semantic 
  embeddings, BM25 lexical retrieval, and structured rule-based scoring using 
  dimension-specific fusion weights to efficiently rank the entire candidate pool. 
  The top candidates are then reranked using the BGE Cross Encoder for deeper semantic 
  understanding. Candidate embeddings are precomputed offline and BM25 indexes are cached, 
  allowing the online ranking step to remain within the challenge runtime constraints. 
  The system produces explainable rankings by generating concise reasons directly from 
  the highest-scoring dimensions and validated profile signals, avoiding unsupported or 
  hallucinated justifications.

